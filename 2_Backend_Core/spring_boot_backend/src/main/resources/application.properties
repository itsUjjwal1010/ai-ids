# ─────────────────────────────────────────────────────────────────────────────
# IDS Dashboard — Spring Boot Application Configuration
# ─────────────────────────────────────────────────────────────────────────────

# Embedded Tomcat server port
server.port=8080

# Static resources — Spring serves index.html, style.css, app.js from /static/
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# Suppress the Spring Boot ASCII art banner (cleaner console output)
spring.main.banner-mode=off

# Reduce noisy STOMP/WebSocket framework logs — we only want our own logs
logging.level.org.springframework.web.socket=WARN
logging.level.org.springframework.messaging=WARN
logging.level.org.springframework.web=WARN

# Show IDS application logs at INFO level
logging.level.com.ids=INFO

# Simple log format: timestamp + level + logger + message
logging.pattern.console=%d{HH:mm:ss} %-5level [%logger{20}] %msg%n

# File upload limits — for CSV/PCAP offline analysis feature
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

